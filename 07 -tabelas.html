<!DOCTYPE html>
<html lang="pt - BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas em HTML 5</title>
</head>
<body>
    <h1>Tabelas em HTML 5</h1>
    <table border="5">
        <thead>
            <tr>
                <th>Nome do Aluno</th>
                <th>Disciplina</th>
                <th>Nota final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Caleb Aragão</td>
                <td>Inglês</td>
                <td>9.0</td>
            </tr>

            <tr>
                <td>Ricardo Medeiros</td>
                <td>Matemática</td>
                <td>9.5</td>
            </tr>

            <tr>
                <td>João Gabriel</td>
                <td>Filosofia</td>
                <td>9.0</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2"><strong>Média da Turma</strong></td>
                <td><strong>9.0</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
